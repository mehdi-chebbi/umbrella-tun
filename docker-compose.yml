services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: umbrella-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umbrella
      POSTGRES_USER: umbrella_user
      POSTGRES_PASSWORD: umbrella_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbrella_user -d umbrella"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Express Backend API ─────────────────────────────────────
  backend:
    build: ./backend
    container_name: umbrella-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: umbrella
      DB_USER: umbrella_user
      DB_PASSWORD: umbrella_pass
      JWT_SECRET: umbrella-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  # ─── React Frontend (Nginx) ──────────────────────────────────
  frontend:
    build: ./frontend
    container_name: umbrella-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
